<!DOCTYPE html>

<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Todo application</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">

    <!-- Header -->
    <div class="text-center mb-5">
        <h1 class="fw-bold">📝 Todo Application</h1>
        <p class="text-muted">Manage your tasks efficiently</p>
    </div>

    <!-- Card -->
    <div class="card shadow-lg border-0 rounded-4">
        <div class="card-body p-4">

            <!-- Add Task Form -->
            <form action="/" method="post" class="mb-4">
                <div class="input-group">
                    <input type="text"
                           name="title"
                           class="form-control form-control-lg"
                           placeholder="Enter a new task..."
                           required>

                    <button class="btn btn-primary btn-lg" type="submit">
                        Add
                    </button>
                </div>
            </form>

            <!-- Task List -->
            <ul class="list-group list-group-flush">

                <li class="list-group-item d-flex justify-content-between align-items-center"
                    th:each="task : ${tasks}">

                    <!-- Left side -->
                    <div class="d-flex align-items-center gap-3">

                        <!-- Toggle Checkbox -->
                        <form th:action="@{'/' + ${task.id} + '/toggle'}" method="post" style="display: inline;">
                            <input type="checkbox"
                                   class="form-check-input"
                                   th:checked="${task.completed}"
                                   onchange="this.form.submit();">
                        </form>

                        <!-- Task Title -->
                        <span th:text="${task.title}"
                              th:classappend="${task.completed} ? 'text-decoration-line-through text-muted' : ''"
                              class="fw-medium">
                    </span>

                    </div>

                    <!-- Delete Button -->
                    <form th:action="@{'/' + ${task.id} + '/delete'}" method="post" style="display: inline;">
                        <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                    </form>
                </li>

            </ul>

        </div>
    </div>

</div>

</body>
</html>
